# Configuração Droid7 Codemagic Workflow - Simplificada
workflows:
  android-debug-build:
    name: Construir APK de Teste
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar ferramentas e limpar
        script: |
          npm install -g cordova
          # Remove ES Module config se existir no package.json
          sed -i '' '/"type": "module"/d' package.json || true
          rm -rf platforms/ plugins/ node_modules/
          npm install
      - name: Adicionar plataforma Android
        script: |
          cordova platform add android
      - name: Construir o APK de teste (Debug)
        script: |
          cordova build android --debug
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/app-debug.apk
