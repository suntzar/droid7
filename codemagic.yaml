# Configuração Droid7 Codemagic Workflow - Estável v2.4 (SDK Fix)
workflows:
  android-debug-build:
    name: Construir APK de Teste v2.4
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar ferramentas e limpar
        script: |
          npm install -g cordova@12.0.0
          sed -i '' '/"type": "module"/d' package.json || true
          rm -rf platforms/ plugins/ node_modules/
          npm install
      - name: Adicionar plataforma Android (v13.0.0)
        script: |
          cordova platform add android@13.0.0 --non-interactive --verbose
      - name: Construir o APK de teste (Debug)
        script: |
          # Forçamos o Gradle a usar as ferramentas de build 33.0.0 disponíveis no ambiente
          cordova build android --debug --verbose --no-telemetry -- --gradleArg=-PcdvBuildToolsVersion=33.0.0
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/app-debug.apk
