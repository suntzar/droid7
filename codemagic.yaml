# Configuração Droid7 Codemagic Workflow - Estável v2.3 (SDK Fix)
workflows:
  android-debug-build:
    name: Construir APK de Teste v2.3
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar ferramentas e limpar
        script: |
          npm install -g cordova@12.0.0
          sed -i '' '/"type": "module"/d' package.json || true
          rm -rf platforms/ plugins/ node_modules/
          npm install
      - name: Instalar Android SDK Tools
        script: |
          # Garante que as ferramentas de build recomendadas estejam disponíveis
          echo "y" | sdkmanager "build-tools;34.0.0" "platforms;android-34"
      - name: Adicionar plataforma Android (v13.0.0)
        script: |
          cordova platform add android@13.0.0 --non-interactive --verbose
      - name: Construir o APK de teste (Debug)
        script: |
          cordova build android --debug --verbose --no-telemetry
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/app-debug.apk
