# Configuração Droid7 Codemagic Workflow - Profissional v3.0 (Estabilidade Total)
workflows:
  android-debug-build:
    name: Construir APK de Teste v3.0
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar ferramentas e limpar
        script: |
          npm install -g cordova@12.0.0
          # Remove ES Module config do package.json se existir
          sed -i '' '/"type": "module"/d' package.json || true
          rm -rf platforms/ plugins/ node_modules/
          npm install
      - name: Adicionar plataforma Android (v12.0.1)
        script: |
          # Versão 12.0.1 é a recomendada para compatibilidade SDK 33/34 estável em CI
          cordova platform add android@12.0.1 --non-interactive --verbose
      - name: Construir o APK de teste (Debug)
        script: |
          cordova build android --debug --no-telemetry --verbose
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/app-debug.apk
