# Configuração Droid7 Codemagic Workflow - Estável v2.2 (CJS Compatibility)
workflows:
  android-debug-build:
    name: Construir APK de Teste v2.2
    max_build_duration: 60
    instance_type: mac_mini_m2 # M2 para performance máxima se disponível
    scripts:
      - name: Instalar ferramentas e limpar
        script: |
          npm install -g cordova@12.0.0
          # Remove o type: module temporariamente se persistir (segurança extra)
          sed -i '' '/"type": "module"/d' package.json || true
          rm -rf platforms/ plugins/ node_modules/
          npm install
      - name: Adicionar plataforma Android (v13.0.0)
        script: |
          # Garante que o ambiente ignore configurações de módulos ES globais
          cordova platform add android@13.0.0 --non-interactive --verbose
      - name: Construir o APK de teste (Debug)
        script: |
          cordova build android --debug --verbose --no-telemetry
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/app-debug.apk
